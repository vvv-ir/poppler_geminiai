name: Build Poppler from Scratch

on: [workflow_dispatch]

jobs:
  build-poppler:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        osx: ["10.5", "10.6", "10.13"]
    
    steps:
      - name: Install Build Tools
        run: |
          sudo apt-get update
          # Пытаемся установить libxar-dev, в котором обычно есть нужная библиотека
          sudo apt-get install -y cmake ninja-build curl tar xz-utils libxar-dev
          
          # Если libxar1 все еще не виден, найдем где он лежит в системе и создадим симлинк
          if [ ! -f /usr/lib/x86_64-linux-gnu/libxar.so.1 ]; then
            echo "Searching for libxar..."
            find /usr/lib -name "libxar.so*"
            # Создаем симлинк на версию, которая есть в системе
            sudo ln -s $(find /usr/lib -name "libxar.so.*" | head -n 1) /usr/lib/x86_64-linux-gnu/libxar.so.1 || true
          fi
      - name: Download and Prepare
        run: |
          set -euo pipefail
          # 1. Скачивание вашего конкретного артефакта из релиза
          RELEASE_URL="https://github.com/vvv-ir/osxcross_gemini_aistudio_way/releases/download/multi-build-23/osxcross-${{ matrix.osx }}-toolchain.tar.bz2"
          curl -LO "$RELEASE_URL"
          tar -xjf osxcross-${{ matrix.osx }}-toolchain.tar.bz2 -C /tmp/
          
          # Установка пути к тулчейну
          echo "PATH=/tmp/target/bin:$PATH" >> $GITHUB_ENV
          
          # 2. Скачивание и распаковка исходников Poppler
          curl -L https://poppler.freedesktop.org/poppler-24.02.0.tar.xz | tar -xJ
          mv poppler-* poppler_src

      - name: Build Poppler
        run: |
          set -euo pipefail
          export CC=o64-clang
          export CXX=o64-clang++
          export MACOSX_DEPLOYMENT_TARGET=${{ matrix.osx }}
          
          mkdir build && cd build
          
          # Использование флага для старых систем (определение архитектуры)
          ARCH_FLAG="-target x86_64-apple-darwin${{ matrix.osx == '10.5' && '9' || (matrix.osx == '10.6' && '10' || '17') }}"
          
          cmake ../poppler_src \
            -DCMAKE_SYSTEM_NAME=Darwin \
            -DCMAKE_C_COMPILER=$CC \
            -DCMAKE_CXX_COMPILER=$CXX \
            -DCMAKE_CXX_FLAGS="$ARCH_FLAG" \
            -DCMAKE_C_FLAGS="$ARCH_FLAG" \
            -DENABLE_QT5=OFF -DENABLE_QT6=OFF -DENABLE_CMS=OFF -DENABLE_LIBTIFF=OFF -DENABLE_PNG=OFF -DBUILD_CPP_TESTS=OFF \
            -DCMAKE_INSTALL_PREFIX=./install
          
          make -j$(nproc)
          make install

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: poppler-bin-${{ matrix.osx }}
          path: build/install/
