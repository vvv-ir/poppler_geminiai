name: Build Poppler from Scratch

on: [workflow_dispatch]

jobs:
  build-poppler:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        osx: ["10.5", "10.6", "10.13"]
    
    steps:
      - name: Install Build Tools
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build curl tar xz-utils

      - name: Download and Prepare
        run: |
          set -euo pipefail
          
          mkdir -p /tmp/osxcross
          RELEASE_URL="https://github.com/vvv-ir/osxcross_gemini_aistudio_way/releases/download/multi-build-23/osxcross-${{ matrix.osx }}-toolchain.tar.bz2"
          curl -LO "$RELEASE_URL"
          
          tar -xjf osxcross-${{ matrix.osx }}-toolchain.tar.bz2 -C /tmp/osxcross/
          
          echo "PATH=/tmp/osxcross/target/bin:${PATH:-}" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=/tmp/osxcross/target/lib:${LD_LIBRARY_PATH:-}" >> $GITHUB_ENV
          echo "OSXCROSS_TARGET_DIR=/tmp/osxcross/target" >> $GITHUB_ENV
          
          curl -L https://poppler.freedesktop.org/poppler-24.02.0.tar.xz | tar -xJ
          mv poppler-* poppler_src

      - name: Build Dependencies and Poppler
        run: |
          set -euo pipefail
          
          # Строго соблюденный синтаксис bash!
          if [ "${{ matrix.osx }}" == "10.5" ]; then TARGET="x86_64-apple-darwin9"; fi
          if [ "${{ matrix.osx }}" == "10.6" ]; then TARGET="x86_64-apple-darwin10"; fi
          if [ "${{ matrix.osx }}" == "10.13" ]; then TARGET="x86_64-apple-darwin17"; fi
          
          # КРИТИЧЕСКИ ВАЖНО для toolchain.cmake: явное указание хоста
          export OSXCROSS_HOST="$TARGET"
          
          TOOLCHAIN_FILE="/tmp/osxcross/target/toolchain.cmake"
          
          if[ "${{ matrix.osx }}" == "10.13" ]; then
            export CMAKE_PREFIX_PATH="/tmp/osxcross/target/macports/pkgs/opt/local"
            export PKG_CONFIG_PATH="/tmp/osxcross/target/macports/pkgs/opt/local/lib/pkgconfig"
          else
            echo "Cross-compiling minimal FreeType for legacy macOS..."
            curl -L https://download.savannah.gnu.org/releases/freetype/freetype-2.13.2.tar.xz | tar -xJ
            cd freetype-2.13.2
            mkdir build_ft && cd build_ft
            
            cmake .. -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN_FILE" \
              -DCMAKE_INSTALL_PREFIX=/tmp/custom_deps \
              -DWITH_ZLIB=OFF -DWITH_BZip2=OFF -DWITH_PNG=OFF -DWITH_HarfBuzz=OFF -DWITH_Brotli=OFF
            make -j$(nproc) install
            cd ../..
            
            export CMAKE_PREFIX_PATH="/tmp/custom_deps"
            
            # Удаляем флаг REQUIRED, чтобы отключение работало гладко
            sed -i 's/find_package(Fontconfig REQUIRED)/find_package(Fontconfig)/g' poppler_src/CMakeLists.txt
          fi
          
          mkdir -p build && cd build
          
          cmake ../poppler_src \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN_FILE" \
            -DCMAKE_PREFIX_PATH="$CMAKE_PREFIX_PATH" \
            -DCMAKE_DISABLE_FIND_PACKAGE_Fontconfig=TRUE \
            -DCMAKE_DISABLE_FIND_PACKAGE_Cairo=TRUE \
            -DCMAKE_DISABLE_FIND_PACKAGE_JPEG=TRUE \
            -DCMAKE_DISABLE_FIND_PACKAGE_PNG=TRUE \
            -DCMAKE_DISABLE_FIND_PACKAGE_TIFF=TRUE \
            -DCMAKE_DISABLE_FIND_PACKAGE_NSS3=TRUE \
            -DENABLE_GPGME=OFF \
            -DENABLE_QT5=OFF -DENABLE_QT6=OFF -DENABLE_CMS=OFF \
            -DENABLE_LIBTIFF=OFF -DENABLE_PNG=OFF -DENABLE_GLIB=OFF \
            -DENABLE_BOOST=OFF -DENABLE_NSS3=OFF -DBUILD_CPP_TESTS=OFF \
            -DCMAKE_INSTALL_PREFIX=./install
          
          make -j$(nproc) install

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: poppler-bin-${{ matrix.osx }}
          path: build/install/
