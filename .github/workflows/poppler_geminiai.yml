name: Build Poppler Final

on: [workflow_dispatch]

jobs:
  build-poppler:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        osx: ["10.5", "10.6", "10.13"]
    
    steps:
      - name: Install Build Tools
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build curl tar xz-utils make

      - name: Download and Prepare
        run: |
          set -euo pipefail
          mkdir -p /tmp/osxcross
          
          # Загрузка тулчейна
          RELEASE_URL="https://github.com/vvv-ir/osxcross_gemini_aistudio_way/releases/download/multi-build-23/osxcross-${{ matrix.osx }}-toolchain.tar.bz2"
          curl -LO "$RELEASE_URL"
          tar -xjf osxcross-${{ matrix.osx }}-toolchain.tar.bz2 -C /tmp/osxcross/
          
          # Настройка окружения
          echo "PATH=/tmp/osxcross/target/bin:${PATH:-}" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=/tmp/osxcross/target/lib:${LD_LIBRARY_PATH:-}" >> $GITHUB_ENV
          
          # Загрузка исходников Poppler
          curl -L https://poppler.freedesktop.org/poppler-24.02.0.tar.xz | tar -xJ
          mv poppler-* poppler_src

      - name: Build Dependencies and Poppler
        run: |
          set -euo pipefail
          
          # Выбор Target архитектуры
          if [ "${{ matrix.osx }}" = "10.5" ]; then TARGET="x86_64-apple-darwin9"; fi
          if [ "${{ matrix.osx }}" = "10.6" ]; then TARGET="x86_64-apple-darwin10"; fi
          if [ "${{ matrix.osx }}" = "10.13" ]; then TARGET="x86_64-apple-darwin17"; fi
          
          CMAKE_WRAPPER="${TARGET}-cmake"
          PREFIX="/tmp/custom_deps"
          mkdir -p $PREFIX

          # 1. ЗАЩИТА ОТ "ТЫКВЫ": Обновляем политики CMake в проекте
          find poppler_src -name "CMakeLists.txt" -exec sed -i 's/cmake_minimum_required(VERSION [0-9.]*)/cmake_minimum_required(VERSION 3.10...3.31)/g' {} +
          
          # 2. ПАТЧИНГ ЗАВИСИМОСТЕЙ: Убираем REQUIRED для Fontconfig и Freetype
          sed -i 's/find_package(Freetype 2.10 REQUIRED)/find_package(Freetype)/g' poppler_src/CMakeLists.txt
          sed -i 's/find_package(Fontconfig 2.13 REQUIRED)/find_package(Fontconfig)/g' poppler_src/CMakeLists.txt

          if [ "${{ matrix.osx }}" = "10.13" ]; then
            PREFIX="/tmp/osxcross/target/macports/pkgs/opt/local"
            export CMAKE_PREFIX_PATH="$PREFIX"
          else
            echo "--- Building Dependency Chain for Legacy macOS ---"
            
            # Zlib (v1.3.1)
            curl -L https://github.com/madler/zlib/archive/refs/tags/v1.3.1.tar.gz | tar -xz
            cd zlib-1.3.1 && $CMAKE_WRAPPER . -DCMAKE_INSTALL_PREFIX=$PREFIX && make -j$(nproc) install && cd ..

            # Libjpeg-turbo (v3.0.2)
            curl -L https://github.com/libjpeg-turbo/libjpeg-turbo/archive/refs/tags/3.0.2.tar.gz | tar -xz
            cd libjpeg-turbo-3.0.2 && $CMAKE_WRAPPER . -DCMAKE_INSTALL_PREFIX=$PREFIX -DENABLE_SHARED=OFF && make -j$(nproc) install && cd ..

            # Libpng (v1.6.43)
            cd libpng-1.6.43 || curl -L https://download.sourceforge.net/libpng/libpng-1.6.43.tar.xz | tar -xJ && cd libpng-1.6.43
            $CMAKE_WRAPPER . -DCMAKE_INSTALL_PREFIX=$PREFIX -DPNG_SHARED=OFF -DZLIB_ROOT=$PREFIX && make -j$(nproc) install && cd ..

            # OpenJPEG (v2.5.2)
            curl -L https://github.com/uclouvain/openjpeg/archive/refs/tags/v2.5.2.tar.gz | tar -xz
            cd openjpeg-2.5.2 && $CMAKE_WRAPPER . -DCMAKE_INSTALL_PREFIX=$PREFIX -DBUILD_SHARED_LIBS=OFF && make -j$(nproc) install && cd ..

            # FreeType (v2.13.2)
            curl -L https://download.savannah.gnu.org/releases/freetype/freetype-2.13.2.tar.xz | tar -xJ
            cd freetype-2.13.2 && $CMAKE_WRAPPER . -DCMAKE_INSTALL_PREFIX=$PREFIX -DFT_DISABLE_ZLIB=OFF -DFT_DISABLE_PNG=OFF -DFT_DISABLE_HARFBUZZ=ON -DFT_DISABLE_BROTLI=ON -DZLIB_ROOT=$PREFIX -DPNG_ROOT=$PREFIX && make -j$(nproc) install && cd ..
            
            export CMAKE_PREFIX_PATH="$PREFIX"
          fi

          echo "--- Final Poppler Build with Image Support ---"
          mkdir -p build_poppler && cd build_poppler
          $CMAKE_WRAPPER ../poppler_src \
            -DCMAKE_PREFIX_PATH="$PREFIX" \
            -DCMAKE_INSTALL_PREFIX=./install \
            -DENABLE_DCTDECODER=libjpeg \
            -DENABLE_LIBOPENJPEG=openjpeg2 \
            -DENABLE_PNG=ON \
            -DENABLE_ZLIB=ON \
            -DCMAKE_DISABLE_FIND_PACKAGE_Fontconfig=TRUE \
            -DCMAKE_DISABLE_FIND_PACKAGE_Cairo=TRUE \
            -DENABLE_QT5=OFF -DENABLE_QT6=OFF -DENABLE_CMS=OFF -DENABLE_GLIB=OFF -DENABLE_GPGME=OFF -DBUILD_CPP_TESTS=OFF \
            -DFREETYPE_INCLUDE_DIR_ft2build="$PREFIX/include/freetype2" \
            -DFREETYPE_INCLUDE_DIR_freetype2="$PREFIX/include/freetype2" \
            -DFREETYPE_LIBRARY="$PREFIX/lib/libfreetype.a"

          make -j$(nproc) install

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: poppler-full-${{ matrix.osx }}
          path: build_poppler/install/
