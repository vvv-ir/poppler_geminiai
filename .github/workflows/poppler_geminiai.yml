name: Build Poppler from Scratch

on: [workflow_dispatch]

jobs:
  build-poppler:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        osx:["10.5", "10.6", "10.13"]
    
    steps:
      - name: Install Build Tools
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build curl tar xz-utils

      - name: Download and Prepare
        run: |
          set -euo pipefail
          RELEASE_URL="https://github.com/vvv-ir/osxcross_gemini_aistudio_way/releases/download/multi-build-23/osxcross-${{ matrix.osx }}-toolchain.tar.bz2"
          curl -LO "$RELEASE_URL"
          tar -xjf osxcross-${{ matrix.osx }}-toolchain.tar.bz2 -C /tmp/
          
          # Guard: Безопасное добавление путей. Конструкция ${VAR:-} вернет пустоту, если переменная не задана.
          echo "PATH=/tmp/target/bin:${PATH:-}" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=/tmp/target/lib:${LD_LIBRARY_PATH:-}" >> $GITHUB_ENV
          
          curl -L https://poppler.freedesktop.org/poppler-24.02.0.tar.xz | tar -xJ
          mv poppler-* poppler_src

      - name: Build Poppler
        run: |
          set -euo pipefail
          export CC=o64-clang
          export CXX=o64-clang++
          export MACOSX_DEPLOYMENT_TARGET=${{ matrix.osx }}
          
          mkdir build && cd build
          
          ARCH_FLAG="-target x86_64-apple-darwin${{ matrix.osx == '10.5' && '9' || (matrix.osx == '10.6' && '10' || '17') }}"
          
          cmake ../poppler_src \
            -DCMAKE_SYSTEM_NAME=Darwin \
            -DCMAKE_C_COMPILER=$CC \
            -DCMAKE_CXX_COMPILER=$CXX \
            -DCMAKE_CXX_FLAGS="$ARCH_FLAG" \
            -DCMAKE_C_FLAGS="$ARCH_FLAG" \
            -DENABLE_QT5=OFF -DENABLE_QT6=OFF -DENABLE_CMS=OFF -DENABLE_LIBTIFF=OFF -DENABLE_PNG=OFF -DBUILD_CPP_TESTS=OFF \
            -DCMAKE_INSTALL_PREFIX=./install
          
          make -j$(nproc)
          make install

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: poppler-bin-${{ matrix.osx }}
          path: build/install/
